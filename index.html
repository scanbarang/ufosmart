<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Absensi Karyawan - UFO Kebonsari</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1565c0">
    <style>
        :root {
            --primary: #1967d2; /* Biru UFO */
            --primary-hover: #1557b0;
            --success: #1967d2; /* Check In sekarang Biru */
            --success-hover: #1557b0;
            --warning: #f59e0b; /* Check Out Jingga */
            --warning-hover: #d97706;
            --danger: #ef4444; /* Tombol OFF sekarang Merah */
            --danger-hover: #dc2626;
            --background: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #000000;
            --text-muted: #757575;
            --border: #e0e0e0;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: var(--background); 
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .box { 
            width: 100%;
            max-width: 360px; 
            background: var(--card-bg); 
            padding: 35px 25px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            box-sizing: border-box;
            border: 1px solid rgba(0,0,0,0.04);
            text-align: center;
            transition: transform 0.2s ease;
        }

        .box-admin { 
            max-width: 900px; 
        }

        .logo-container {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px auto;
            border-radius: 50%;
            border: 3px solid #eef2f6;
            padding: 3px;
            background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-toko {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        h2 {
            margin: 0 0 5px 0;
            font-size: 20px;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .sub-title {
            color: var(--text-muted);
            font-size: 13px;
            margin: 0 0 25px 0;
            font-weight: 500;
        }

        .jam-digital {
            font-size: 32px;
            font-weight: 800;
            color: var(--primary);
            margin: 15px 0;
            font-variant-numeric: tabular-nums;
            letter-spacing: 1px;
        }

        .tanggal-digital {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 25px;
            font-weight: 500;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn-grid button svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .input-group {
            text-align: left;
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333333;
        }

        input { 
            width: 100%; 
            padding: 12px 16px; 
            border-radius: 10px; 
            border: 1px solid var(--border);
            background: #ffffff;
            font-size: 15px;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(25, 103, 210, 0.1);
        }

        button { 
            width: 100%; 
            padding: 12px; 
            margin-top: 10px;
            border-radius: 8px; 
            font-size: 14px; 
            font-weight: 700; 
            cursor: pointer; 
            border: none;
            transition: all 0.2s ease;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-checkin {
            background: var(--success);
            color: white;
            padding: 18px 5px;
            border-radius: 12px;
            flex-direction: column;
            gap: 8px;
            font-size: 11px;
        }
        .btn-checkin:hover { background: var(--success-hover); }

        .btn-off {
            background: var(--danger);
            color: white;
            padding: 18px 5px;
            border-radius: 12px;
            flex-direction: column;
            gap: 8px;
            font-size: 11px;
        }
        .btn-off:hover { background: var(--danger-hover); }

        .btn-checkout {
            background: var(--warning);
            color: white;
            padding: 18px 5px;
            border-radius: 12px;
            flex-direction: column;
            gap: 8px;
            font-size: 11px;
        }
        .btn-checkout:hover { background: var(--warning-hover); }

        .btn-absen-kirim { 
            background: var(--primary); 
            color: white;
            font-size: 14px;
            margin-top: 20px;
        }
        .btn-absen-kirim:hover { background: var(--primary-hover); }

        .btn-logout { 
            background: transparent; 
            color: var(--danger); 
            border: 1.5px solid var(--danger);
            font-size: 12px; 
            padding: 8px; 
            margin-top: 15px;
        }
        .btn-logout:hover { background: rgba(239, 68, 68, 0.05); }

        .btn-kembali {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
            font-size: 12px;
            padding: 8px;
            margin-top: 10px;
        }

        #kamera { 
            width: 100%; 
            aspect-ratio: 9 / 16;
            object-fit: cover;
            border-radius: 12px; 
            background: #1e293b; 
            border: 1px solid var(--border);
            max-height: 480px;
        }

        .stat-box {
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 20px;
            font-size: 13px;
            font-weight: 600;
        }
        .stat-box span {
            color: var(--primary);
            font-size: 16px;
            font-weight: 800;
        }

        #status-log {
            font-size: 12px;
            color: var(--text-muted);
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .table-container {
            width: 100%;
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-top: 20px;
        }

        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 14px 18px; font-size: 14px; }
        th { background: #f8fafc; color: var(--text-main); font-weight: 600; border-bottom: 2px solid var(--border); }
        td { border-bottom: 1px solid var(--border); vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f8fafc; }
         
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-in { background: #d1fae5; color: #065f46; }
        .badge-out { background: #fef3c7; color: #92400e; }
        .badge-off { background: #fee2e2; color: #991b1b; }

        .btn-lihat {
            display: inline-block;
            background: #e0f2fe;
            color: #0369a1;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            text-decoration: none;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
        }

        .admin-header button { margin: 0; width: auto; padding: 8px 16px; }

        .spinner {
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 2px solid #fff;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: flex; justify-content: center;
            align-items: center; z-index: 1000;
        }
        .modal-box {
            background: white; padding: 30px; border-radius: 20px;
            width: 80%; max-width: 300px; text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .modal-box button { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; margin-top: 15px; }

        .btn-disabled {
            background-color: #d1d5db !important;
            cursor: not-allowed !important;
            opacity: 0.5;
            pointer-events: none;
        }

        .info-jam-absen {
            font-size: 10px;
            font-weight: bold;
            margin-top: 6px;
            display: block;
            text-align: center;
            min-height: 15px;
        }
    </style>
</head>
<body>
    <!-- Konten Aplikasi Anda Berada di Sini -->
    <div class="box">
        <div class="logo-container">
            <img src="logo.png" class="logo-toko" alt="Logo">
        </div>
        <h2>UFO KEBONSARI</h2>
        <div class="sub-title">Sistem Absensi Karyawan</div>
        
        <div class="jam-digital" id="jam">18:00:00</div>
        <div class="tanggal-digital" id="tanggal">Senin, 20 Juli 2026</div>

        <!-- Contoh Tombol Login / Masuk -->
        <button class="btn btn-primary" onclick="prosesLogin()">Masuk Aplikasi</button>
    </div>

    <script>
        // Contoh Fungsi Login (Tanpa perintah requestFullscreen penyebab notifikasi browser)
        function prosesLogin() {
            console.log("Login diproses tanpa gangguan notifikasi layar penuh.");
        }

        // Script Jam Digital Sederhana
        function updateJam() {
            const now = new Date();
            document.getElementById('jam').innerText = now.toTimeString().split(' ')[0];
        }
        setInterval(updateJam, 1000);
    </script>
</body>
</html>
